<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lana Del Rey Unofficial Stor</title>
    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/cart.css" />
  </head>
  <body>
    <header>
      <nav class="menu">
        <a href="index.html"
          ><img src="images/Logo.svg" alt="Home" class="headerimg"
        /></a>
        <ul class="menu-buttons">
          <li class="menu-item">
            <select name="currency" id="currency-select">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </li>
          <li class="menu-item">
            <img src="images/icons/Search-outline.svg" alt="search" />
          </li>
          <li class="menu-item">
            <a href="account.html"
              ><img src="images/icons/person-outline.svg" alt="account"
            /></a>
          </li>
          <li class="menu-item">
            <img
              src="images/icons/bag-handle-outline.svg"
              alt="cart"
              class="icon_cart"
            />
            <span>0</span>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="cartTab">
        <h1>Shopping Cart</h1>
        <div class="ListCart"></div>
        <div class="btn">
          <button class="close">Close</button>
          <button class="checkout">Check Out</button>
        </div>
      </div>
      <div class="CartContainer">
        <h1>Your Cart</h1>
        <div class="CartItemList">
          <div class="CartItem">
            <div class="image">
              <img src="images/product_shirt.png" alt="shirt" />
            </div>
            <div class="name">Shirt</div>
            <div class="totalPrice">100</div>
            <div class="quantity">
              <span class="minus">+</span>
              <span>5</span>
              <span class="plus">-</span>
            </div>
          </div>
          <div class="CartItem">
            <div class="image">
              <img src="images/product_shirt.png" alt="shirt" />
            </div>
            <div class="name">Shirt</div>
            <div class="totalPrice">100</div>
            <div class="quantity">
              <span class="minus">+</span>
              <span>5</span>
              <span class="plus">-</span>
            </div>
          </div>
          <div class="CartItem">
            <div class="image">
              <img src="images/product_shirt.png" alt="shirt" />
            </div>
            <div class="name">Shirt</div>
            <div class="totalPrice">100</div>
            <div class="quantity">
              <span class="minus">+</span>
              <span>5</span>
              <span class="plus">-</span>
            </div>
          </div>
          <div class="CartItem">
            <div class="image">
              <img src="images/product_shirt.png" alt="shirt" />
            </div>
            <div class="name">Shirt</div>
            <div class="totalPrice">100</div>
            <div class="quantity">
              <span class="minus">+</span>
              <span>5</span>
              <span class="plus">-</span>
            </div>
          </div>
        </div>
      </div>
      <div class="CheckoutContainer">
        <h1>Checkout</h1>
        <div class="CheckoutWindow">
          <ul>
            <li><h2>Discounts</h2><button>Add Discount Code</button></li>
            <li><h3>Total product price</h3><span>$19.99</span></li>
            <li><h4>Delivery fee</h4><span>$3.00</span></li>
            <li><h5>Total:</h5><span>$038423984</span></li>
          </ul>
          <div class="CheckoutButtons">
            <button>Continue To Payment</button>
            <button>Log In</button>
          </div>
        </div>
        </div>
        
      

      
    </main>
    <footer>
        <!--Sociala medier-->
        <div class="socialmedia">
          <a href="https://www.facebook.com/lanadelrey"
            ><img
              src="images/icons/socialmedia/Facebook_icon.svg"
              alt="Facebook"
          /></a>
          <a href="https://www.instagram.com/lanadelrey/"
            ><img
              src="images/icons/socialmedia/Instagram_icon.svg"
              alt="Instagram"
          /></a>
          <a href="https://twitter.com/LanaDelRey"
            ><img src="images/icons/socialmedia/X_icon.svg" alt="X"
          /></a>
          <a href="https://open.spotify.com/artist/00FQb4jTyendYWaN8pK0wa"
            ><img src="images/icons/socialmedia/Spotify_icon.svg" alt="Spotify"
          /></a>
        </div>
        <!--Kontaktformulär-->
        <section class="newsletter_form">
          <form action="">
            <label for="fname">First Name</label>
            
            <input
              type="text"
              id="fname"
              name="firstname"
              placeholder="Your name.."
            />
            
            <label for="lname">Last Name</label>
            <input
              type="text"
              id="lname"
              name="lastname"
              placeholder="Your last name.."
            />
            
            <label for="country">Country</label>
            <select name="country" id="country">
              <option value="sweden">Sweden</option>
              <option value="uk">United Kingdom</option>
              <option value="us">United States</option>
              <option value="germany">Germany</option>
              <option value="japan">Japan</option></select
            >

            <label for="email">Sign up for our newsletter</label>
            <input type="email" id="email" placeholder="Your Email" 

            <label for="phonenumber">Phone Number</label>
            <input
              type="tel"
              name="phonenumber"
              id="phonenumber"
              placeholder="1234567890"
            />
            
            <input type="submit" value="Subscribe">
          </form>
        </section>
        <div class="paymentmethods">
          <img
            src="images/icons/payment/amazon-pay-svgrepo-com.svg"
            alt="Amazon Pay"
          />
          <img
            src="images/icons/payment/apple-pay-svgrepo-com.svg"
            alt="Apple Pay"
          />
          <img
            src="images/icons/payment/bancontact-svgrepo-com.svg"
            alt="Bancontact"
          />
          <img
            src="images/icons/payment/bitcoin-svgrepo-com.svg"
            alt="Bitcoin"
          />
          <img
            src="images/icons/payment/mastercard-full-svgrepo-com.svg"
            alt="Mastercard"
          />
        </div>
        <h4>&copy; 2023 Lana Del Rey Unofficial Store. All rights reserved.</h4>
      </footer>
    <script src="jscript/app.js" defer></script>
  </body>
</html>
