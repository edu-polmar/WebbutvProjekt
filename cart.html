<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/general.css" />
  </head>
  <body>
    <header>
      <nav class="menu">
        <a href="index.html"
          ><img src="images/Logo.svg" alt="Home" class="headerimg"
        /></a>
        <ul class="menu-buttons">
          <li class="menu-item">
            <select name="currency" id="currency-select">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </li>
          <li class="menu-item">
            <img src="/images/icons/Search-outline.svg" alt="search" />
          </li>
          <li class="menu-item">
            <a href="account.html"
              ><img src="/images/icons/person-outline.svg" alt="account"
            /></a>
          </li>
          <li class="menu-item">
            <a href="cart.html"
              ><img src="/images/icons/bag-handle-outline.svg" alt="cart"
            /></a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <div class="cart_container">
        <h1>Your Cart</h1>
        <div class="cart_item">
          <img src="images/product_shirt.png" alt="Product Image" />
          <div class="cart_item_details">
            <h2>Product Name</h2>
            <span class="price">$19.99</span>
            <button class="remove_button">Remove</button>
          </div>
        </div>
        <div class="cart_item">
          <img src="images/product_shirt.png" alt="Product Image" />
          <div class="cart_item_details">
            <h2>Product Name</h2>
            <span class="price">$19.99</span>
            <button class="remove_button">Remove</button>
          </div>
        </div>
        <div class="cart_summary">
          <h2>Total: $39.98</h2>
          <button class="checkout_button">Proceed to Checkout</button>
        </div>
      </div>
      <footer>
        <!--Sociala medier-->
        <div class="socialmedia">
          <a href="https://www.facebook.com/lanadelrey"
            ><img
              src="images/icons/socialmedia/Facebook_icon.svg"
              alt="Facebook"
          /></a>
          <a href="https://www.instagram.com/lanadelrey/"
            ><img
              src="images/icons/socialmedia/Instagram_icon.svg"
              alt="Instagram"
          /></a>
          <a href="https://twitter.com/LanaDelRey"
            ><img src="images/icons/socialmedia/X_icon.svg" alt="X"
          /></a>
          <a href="https://open.spotify.com/artist/00FQb4jTyendYWaN8pK0wa"
            ><img src="images/icons/socialmedia/Spotify_icon.svg" alt="Spotify"
          /></a>
        </div>
        <!--Kontaktformulär-->
        <section class="newsletter_form">
          <label for="email">Sign up for our newsletter</label><br />
          <input type="email" id="email" placeholder="Your Email" /><br />
          <label for="phonenumber">Phone Number</label><br />
          <input
            type="tel"
            name="phonenumber"
            id="phonenumber"
            placeholder="1234567890"
          />
          <br />
          <button type="submit">Subscribe</button>
        </section>
        <div class="paymentmethods">
          <img
            src="images/icons/payment/amazon-pay-svgrepo-com.svg"
            alt="Amazon Pay"
          />
          <img
            src="images/icons/payment/apple-pay-svgrepo-com.svg"
            alt="Apple Pay"
          />
          <img
            src="images/icons/payment/bancontact-svgrepo-com.svg"
            alt="Bancontact"
          />
          <img
            src="images/icons/payment/bitcoin-svgrepo-com.svg"
            alt="Bitcoin"
          />
          <img
            src="images/icons/payment/mastercard-full-svgrepo-com.svg"
            alt="Mastercard"
          />
        </div>
        <h4>&copy; 2023 Lana Del Rey Unofficial Store. All rights reserved.</h4>
      </footer>
    </main>
  </body>
</html>
