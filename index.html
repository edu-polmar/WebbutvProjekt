<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lana Del Rey Unofficial Store</title>
    <link rel="stylesheet" href="/css/general.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Protest+Guerrilla&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap");
    </style>
  </head>
  <body class="">
    <header>
      <nav class="menu">
        <a href="index.html"
          ><img src="images/Logo.svg" alt="Home" class="headerimg"
        /></a>
        <ul class="menu-buttons">
          <li class="menu-item">
            <select name="currency" id="currency-select">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </li>
          <li class="menu-item">
            <img src="/images/icons/Search-outline.svg" alt="search" />
          </li>
          <li class="menu-item">
            <a href="-"
              ><img src="/images/icons/person-outline.svg" alt="account"
            /></a>
          </li>
          <li class="menu-item">
            <img
              src="/images/icons/bag-handle-outline.svg"
              alt="cart"
              class="icon_cart"
            />
            <span>0</span>
          </li>
        </ul>
      </nav>
      <div class="hero">
        <!--<section class="herolink">
          <a href="https://open.spotify.com/artist/00FQb4jTyendYWaN8pK0wa"
            >Listen on Spotify</a
          >
        </section>-->
      </div>
    </header>
    <main>
      <div class="listProduct">
        <div class="product_outer_ratio">
          <img
            class="product_image"
            src="images/product_shirt.png"
            alt="Shirt"
          />
          <h2><a href="product.html">Description for the shirt</a></h2>
          <span class="price">19.99</span>
          <button class="addToCart">ADD TO CART</button>
        </div>
      </div>
      <div class="cartTab">
        <h1>Shopping Cart</h1>
        <div class="ListCart"></div>
        <div class="btn">
          <button class="close">Close</button>
          <button class="checkout">Check Out</button>
        </div>
      </div>
    </main>
    <footer>
      <!--Sociala medier-->
      <div class="socialmedia">
        <a href="https://www.facebook.com/lanadelrey"
          ><img src="images/icons/socialmedia/Facebook_icon.svg" alt="Facebook"
        /></a>
        <a href="https://www.instagram.com/lanadelrey/"
          ><img
            src="images/icons/socialmedia/Instagram_icon.svg"
            alt="Instagram"
        /></a>
        <a href="https://twitter.com/LanaDelRey"
          ><img src="images/icons/socialmedia/X_icon.svg" alt="X"
        /></a>
        <a href="https://open.spotify.com/artist/00FQb4jTyendYWaN8pK0wa"
          ><img src="images/icons/socialmedia/Spotify_icon.svg" alt="Spotify"
        /></a>
      </div>
      <!--Kontaktformulär-->
      <section class="newsletter_form">
        <form action="">
          <label for="fname">First Name</label>

          <input
            type="text"
            id="fname"
            name="firstname"
            placeholder="Your name.."
          />

          <label for="lname">Last Name</label>
          <input
            type="text"
            id="lname"
            name="lastname"
            placeholder="Your last name.."
          />

          <label for="country">Country</label>
          <select name="country" id="country">
            <option value="sweden">Sweden</option>
            <option value="uk">United Kingdom</option>
            <option value="us">United States</option>
            <option value="germany">Germany</option>
            <option value="japan">Japan</option>
          </select>

          <label for="email">Sign up for our newsletter</label>
          <input type="email" id="email" placeholder="Your Email" />

          <label for="phonenumber">Phone Number</label>
          <input
            type="tel"
            name="phonenumber"
            id="phonenumber"
            placeholder="1234567890"
          />

          <input type="submit" value="Subscribe" />
        </form>
      </section>
      <div class="paymentmethods">
        <img
          src="images/icons/payment/amazon-pay-svgrepo-com.svg"
          alt="Amazon Pay"
        />
        <img
          src="images/icons/payment/apple-pay-svgrepo-com.svg"
          alt="Apple Pay"
        />
        <img
          src="images/icons/payment/bancontact-svgrepo-com.svg"
          alt="Bancontact"
        />
        <img src="images/icons/payment/bitcoin-svgrepo-com.svg" alt="Bitcoin" />
        <img
          src="images/icons/payment/mastercard-full-svgrepo-com.svg"
          alt="Mastercard"
        />
      </div>
      <h4>&copy; 2023 Lana Del Rey Unofficial Store. All rights reserved.</h4>
    </footer>
    <script src="/jscript/currency.js"></script>
    <script src="/jscript/app.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
  </body>
</html>
