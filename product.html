<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lana Del Rey Unofficial Store</title>
    <link rel="stylesheet" href="/css/product.css" />
    <link rel="stylesheet" href="/css/general.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Protest+Guerrilla&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap");
    </style>
  </head>
  <body>
    <header>
      <nav class="menu">
        <a href="index.html"
          ><img src="images/Logo.svg" alt="Home" class="headerimg"
        /></a>
        <ul class="menu-buttons">
          <li class="menu-item">
            <select name="currency" id="currency-select">
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </li>
          <li class="menu-item">
            <img src="/images/icons/Search-outline.svg" alt="search" />
          </li>
          <li class="menu-item">
            <a href="account.html"
              ><img src="/images/icons/person-outline.svg" alt="account"
            /></a>
          </li>
          <li class="menu-item">
            <img
              src="/images/icons/bag-handle-outline.svg"
              alt="cart"
              class="icon_cart"
            />
            <span>0</span>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="product_ratio">
        <img
          src="images/product_shirt.png"
          alt="Product Image"
          class="product_image"
        />
      </section>
      <section id="product_info">
        <h1>Product Name</h1>
        <p>Product description goes here.</p>
        <span class="price">$19.99</span>
        <h2>Size</h2>
        <ul class="product_size_buttons">
          <li><button class="size-button">M</button></li>
          <li><button class="size-button">L</button></li>
          <li><button class="size-button">XL</button></li>
        </ul>
        <button id="addtocart" onclick="addToCart('Shirt', 19.99)">
          Add to Cart
        </button>
      </section>
      <section class="product_details">
        <table>
          <caption>
            yadayadyayda
          </caption>
          <thead>
            <tr>
              <th>Material</th>
              <th>Care Instructions</th>
              <th>Made In</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>100% Cotton</td>
              <td>Machine wash cold, tumble dry low</td>
              <td>USA</td>
            </tr>
            <tr>
              <td>Example 1</td>
              <td>Example 2</td>
              <td>Example 3</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <th scope="row" colspan="2">Example 4</th>
              <td>Example 5</td>
            </tr>
          </tfoot>
        </table>
      </section>

      <footer>
        <!--Sociala medier-->
        <div class="socialmedia">
          <a href="https://www.facebook.com/lanadelrey"
            ><img
              src="images/icons/socialmedia/Facebook_icon.svg"
              alt="Facebook"
          /></a>
          <a href="https://www.instagram.com/lanadelrey/"
            ><img
              src="images/icons/socialmedia/Instagram_icon.svg"
              alt="Instagram"
          /></a>
          <a href="https://twitter.com/LanaDelRey"
            ><img src="images/icons/socialmedia/X_icon.svg" alt="X"
          /></a>
          <a href="https://open.spotify.com/artist/00FQb4jTyendYWaN8pK0wa"
            ><img src="images/icons/socialmedia/Spotify_icon.svg" alt="Spotify"
          /></a>
        </div>
        <!--Kontaktformulär-->
        <section class="newsletter_form">
          <form action="">
            <label for="fname">First Name</label>
            
            <input
              type="text"
              id="fname"
              name="firstname"
              placeholder="Your name.."
            />
            
            <label for="lname">Last Name</label>
            <input
              type="text"
              id="lname"
              name="lastname"
              placeholder="Your last name.."
            />
            
            <label for="country">Country</label>
            <select name="country" id="country">
              <option value="sweden">Sweden</option>
              <option value="uk">United Kingdom</option>
              <option value="us">United States</option>
              <option value="germany">Germany</option>
              <option value="japan">Japan</option></select
            >

            <label for="email">Sign up for our newsletter</label>
            <input type="email" id="email" placeholder="Your Email" 

            <label for="phonenumber">Phone Number</label>
            <input
              type="tel"
              name="phonenumber"
              id="phonenumber"
              placeholder="1234567890"
            />
            
            <input type="submit" value="Subscribe">
          </form>
        </section>
        <div class="paymentmethods">
          <img
            src="images/icons/payment/amazon-pay-svgrepo-com.svg"
            alt="Amazon Pay"
          />
          <img
            src="images/icons/payment/apple-pay-svgrepo-com.svg"
            alt="Apple Pay"
          />
          <img
            src="images/icons/payment/bancontact-svgrepo-com.svg"
            alt="Bancontact"
          />
          <img
            src="images/icons/payment/bitcoin-svgrepo-com.svg"
            alt="Bitcoin"
          />
          <img
            src="images/icons/payment/mastercard-full-svgrepo-com.svg"
            alt="Mastercard"
          />
        </div>
        <h4>&copy; 2023 Lana Del Rey Unofficial Store. All rights reserved.</h4>
      </footer>
    </main>
    <script src="/jscript/currency.js"></script>
    <!--<script src="/jscript/buttonselected.js"></script>-->
    <script src="/jscript/addtocart.js"></script>
  </body>
</html>
